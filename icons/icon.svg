<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Hivey AI">
  <defs>
    <linearGradient id="hive" x1="12" y1="10" x2="84" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="0.5" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Hivey mark: a beehive (skep) built from 4 thick, fully-rounded horizontal bars,
       widest on top tapering to the smallest at the bottom.
       Yellow→orange gradient, no background, legible down to favicon size. -->
  <g fill="url(#hive)">
    <rect x="20" y="13" width="56" height="13" rx="6.5"/>
    <rect x="12" y="32" width="72" height="13" rx="6.5"/>
    <rect x="16" y="51" width="64" height="13" rx="6.5"/>
    <rect x="26" y="70" width="44" height="13" rx="6.5"/>
  </g>
</svg>
