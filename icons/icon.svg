<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="g" x1="18" y1="14" x2="78" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Clean modern mark: a chat bubble (the AI) with a sidebar bar + message lines.
       Reads instantly as "AI sidebar", legible down to favicon size, gradient fill,
       transparent background, no framing box/border. -->
  <g fill="url(#g)">
    <!-- bubble tail (bottom-left), merged with the body -->
    <path d="M30 60 L22 81 L46 64 Z"/>
    <!-- bubble body -->
    <rect x="14" y="15" width="68" height="51" rx="17"/>
  </g>
  <!-- interior: sidebar bar + three message lines -->
  <g fill="#ffffff">
    <rect x="25" y="27" width="7.5" height="27" rx="3.75"/>
    <rect x="39.5" y="28" width="28" height="6.6" rx="3.3"/>
    <rect x="39.5" y="39.7" width="28" height="6.6" rx="3.3"/>
    <rect x="39.5" y="51.4" width="18" height="6.6" rx="3.3"/>
  </g>
</svg>
